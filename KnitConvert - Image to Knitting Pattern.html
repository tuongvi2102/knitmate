(function() {
  var H = 920;

  // Override window.innerHeight for JS that reads it to compute heights
  try {
    Object.defineProperty(window, 'innerHeight', { configurable: true, get: function() { return H; } });
  } catch(e) {}

  function vhToPx(s) {
    return s.replace(/([0-9.]+)(dvh|svh|lvh|vh)/g, function(_, n, unit) {
      if (parseFloat(n) === 100) return n + unit;
      return (parseFloat(n) * H / 100) + 'px';
    });
  }

  // Patch CSS values (not selectors) recursively through @layer/@media/@supports
  function patchRules(rules) {
    try {
      for (var i = 0; i < rules.length; i++) {
        var rule = rules[i];
        if (rule.cssRules) patchRules(rule.cssRules); // recurse into at-rules
        if (!rule.style) continue;
        for (var j = 0; j < rule.style.length; j++) {
          var prop = rule.style[j];
          var val = rule.style.getPropertyValue(prop);
          if (val.indexOf('vh') === -1) continue;
          rule.style.setProperty(prop, vhToPx(val), rule.style.getPropertyPriority(prop));
        }
      }
    } catch(e) {}
  }
  function patchSheet(sheet) {
    try { patchRules(sheet.cssRules || []); } catch(e) {}
  }

  try {
    var _ins = CSSStyleSheet.prototype.insertRule;
    CSSStyleSheet.prototype.insertRule = function(rule, index) {
      var idx = _ins.call(this, rule, index);
      try { if (this.cssRules && this.cssRules[idx]) patchRules([this.cssRules[idx]]); } catch(e) {}
      return idx;
    };
  } catch(e) {}

  try {
    var _rs = CSSStyleSheet.prototype.replaceSync;
    if (_rs) {
      CSSStyleSheet.prototype.replaceSync = function(text) {
        _rs.call(this, text);
        patchSheet(this);
      };
    }
  } catch(e) {}

  try {
    var _r = CSSStyleSheet.prototype.replace;
    if (_r) {
      CSSStyleSheet.prototype.replace = function(text) {
        var self = this;
        return _r.call(this, text).then(function(sheet) { patchSheet(sheet || self); return sheet || self; });
      };
    }
  } catch(e) {}

  // ─── DOM-LEVEL FALLBACK (Tailwind v3 / plain <style> textContent updates) ─
  function fixInlineVh(el) {
    var s = el.getAttribute && el.getAttribute('style');
    if (s && s.indexOf('vh') !== -1) el.setAttribute('style', vhToPx(s));
  }

  function watchStyleEl(el) {
    if (!el || el.getAttribute('data-vh-fix') || el._vhWatched) return;
    el._vhWatched = true;
    if (el.sheet) patchSheet(el.sheet);
    try {
      new MutationObserver(function() { if (el.sheet) patchSheet(el.sheet); })
        .observe(el, { childList: true, subtree: true, characterData: true });
    } catch(e) {}
  }

  function applyFixes() {
    document.documentElement.style.setProperty('--vh', (H / 100) + 'px');
    document.querySelectorAll('[style]').forEach(fixInlineVh);
    document.querySelectorAll('style').forEach(watchStyleEl);
    try { (document.adoptedStyleSheets || []).forEach(patchSheet); } catch(e) {}
    try {
      new MutationObserver(function(muts) {
        muts.forEach(function(m) {
          m.addedNodes.forEach(function(node) {
            if (node.nodeType !== 1) return;
            if (node.tagName === 'STYLE') watchStyleEl(node);
            fixInlineVh(node);
            if (node.querySelectorAll) node.querySelectorAll('[style]').forEach(fixInlineVh);
          });
        });
      }).observe(document.documentElement, { childList: true, subtree: true });
    } catch(e) {}
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', applyFixes);
  else applyFixes();

  window.addEventListener('load', function() {
    document.querySelectorAll('style').forEach(watchStyleEl);
    document.querySelectorAll('[style]').forEach(fixInlineVh);
    try { (document.adoptedStyleSheets || []).forEach(patchSheet); } catch(e) {}
  });
})();
</script>

  <script>
    (function() {
      // Block <a href="…"> navigation unconditionally.
      // ONLY e.preventDefault() — onclick handlers on anchors still fire so all
      // JavaScript UI bindings (tabs, dropdowns, modals) work as expected.
      document.addEventListener('click', function(e) {
        var a = e.target && e.target.closest ? e.target.closest('a[href]') : null;
        if (!a) return;
        e.preventDefault();
      }, true);

      // Block window.open
      try { window.open = function() { return null; }; } catch (_) {}

      // Block history navigation APIs
      try {
        history.pushState = function() {};
        history.replaceState = function() {};
      } catch (_) {}

      // Block location.assign and location.replace
      try {
        if (window.location) {
          window.location.assign = function() {};
          window.location.replace = function() {};
        }
      } catch (_) {}

      // Block window.location.href = '…' and location.href = '…' direct assignments.
      // Override the href setter on Location.prototype (iframe-local, does not affect parent).
      try {
        var _locProto = Location.prototype;
        var _hrefDesc = Object.getOwnPropertyDescriptor(_locProto, 'href');
        if (_hrefDesc && typeof _hrefDesc.set === 'function') {
          Object.defineProperty(_locProto, 'href', {
            get: _hrefDesc.get,
            set: function() { /* navigation blocked — onclick already ran */ },
            configurable: true,
            enumerable: true,
          });
        }
      } catch (_) {}
    })();
  </script>
